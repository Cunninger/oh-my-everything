<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com;" />
  <title>oh-my-everything</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./assets/styles.css" />
</head>
<body>
  <div id="app">
    <!-- Title bar -->
    <div id="titlebar">
      <div class="titlebar-left">
        <button id="btn-settings" class="titlebar-icon-btn" title="设置" aria-label="设置">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </button>
        <span class="titlebar-text">oh-my-everything</span>
      </div>
      <div class="titlebar-buttons">
        <button id="btn-minimize" class="titlebar-btn" aria-label="最小化">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
        <button id="btn-close" class="titlebar-btn close" aria-label="关闭">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
    </div>

    <!-- Search area -->
    <div id="search-area">
      <div class="search-row">
        <div class="search-input-wrap">
          <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="search-input" placeholder="输入自然语言搜索，例如：今天修改的所有 PDF 文件" autocomplete="off" />
        </div>
        <button id="btn-search" class="btn-primary">
          <span class="btn-label">搜索</span>
          <span class="btn-spinner hidden"></span>
        </button>
      </div>
      <div id="syntax-preview" class="syntax-preview hidden">
        <label>Everything 语法：</label>
        <input type="text" id="syntax-input" />
        <button id="btn-rerun" class="btn-small">重新搜索</button>
      </div>
    </div>

    <!-- Results area -->
    <div id="results-area">
      <table id="results-table">
        <thead>
          <tr>
            <th class="col-name" data-sort="type" style="cursor:pointer">文件名</th>
            <th class="col-path">路径</th>
            <th class="col-size" data-sort="size" style="cursor:pointer">大小</th>
            <th class="col-date" data-sort="date" style="cursor:pointer">修改时间</th>
          </tr>
        </thead>
        <tbody id="results-body"></tbody>
      </table>
      <div id="results-empty" class="hidden">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--text-secondary)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <p>无搜索结果</p>
      </div>
      <div id="results-loading" class="hidden">
        <div class="spinner"></div>
        <p>搜索中...</p>
      </div>
    </div>

    <!-- Status bar -->
    <div id="statusbar">
      <span id="status-results"></span>
      <span id="status-ai"></span>
    </div>

    <!-- Settings panel -->
    <div id="settings-overlay" class="hidden">
      <div id="settings-panel">
        <h2>设置</h2>
        <div class="setting-group">
          <label>AI 提供者</label>
          <select id="set-provider">
            <option value="ollama">Ollama (本地)</option>
            <option value="openai">OpenAI</option>
            <option value="claude">Claude</option>
          </select>
        </div>
        <div class="setting-group">
          <label>API Key</label>
          <input type="password" id="set-apikey" placeholder="留空则不需要" />
        </div>
        <div class="setting-group">
          <label>Base URL</label>
          <input type="text" id="set-baseurl" placeholder="默认使用官方地址" />
        </div>
        <div class="setting-group">
          <label>模型</label>
          <input type="text" id="set-model" />
        </div>
        <div class="setting-group">
          <label>es.exe 路径</label>
          <div class="inline-row">
            <input type="text" id="set-espath" placeholder="自动检测或手动指定" />
            <button id="btn-browse-es" class="btn-small">浏览</button>
          </div>
        </div>
        <div class="setting-group">
          <label>最大结果数</label>
          <input type="number" id="set-maxresults" min="10" max="1000" value="100" />
        </div>
        <div class="setting-group">
          <label>排除文件夹</label>
          <div class="exclude-tags">
            <button class="exclude-tag" data-value="node_modules">node_modules</button>
            <button class="exclude-tag" data-value=".git">.git</button>
            <button class="exclude-tag" data-value="target">target</button>
            <button class="exclude-tag" data-value="dist">dist</button>
            <button class="exclude-tag" data-value="build">build</button>
            <button class="exclude-tag" data-value=".cache">.cache</button>
            <button class="exclude-tag" data-value=".next">.next</button>
            <button class="exclude-tag" data-value=".temp">.temp</button>
            <button class="exclude-tag" data-value=".idea">.idea</button>
            <button class="exclude-tag" data-value=".vscode">.vscode</button>
          </div>
          <textarea id="set-exclude" rows="3" placeholder="自定义排除项，每行一个"></textarea>
        </div>
        <div class="setting-group">
          <label>主题</label>
          <select id="set-theme">
            <option value="system">跟随系统</option>
            <option value="light">亮色</option>
            <option value="dark">暗色</option>
          </select>
        </div>
        <div class="settings-actions">
          <button id="btn-save-settings" class="btn-primary">保存</button>
          <button id="btn-close-settings" class="btn-text">关闭</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="./src/main.ts"></script>
</body>
</html>
