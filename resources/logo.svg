<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0078d4"/>
      <stop offset="100%" stop-color="#005a9e"/>
    </linearGradient>
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect x="32" y="32" width="448" height="448" rx="96" ry="96" fill="url(#bgGrad)" filter="url(#shadow)"/>

  <!-- Inner subtle ring -->
  <rect x="64" y="64" width="384" height="384" rx="80" ry="80" fill="none" stroke="#ffffff" stroke-opacity="0.15" stroke-width="4"/>

  <!-- Magnifying glass handle -->
  <line x1="320" y1="320" x2="392" y2="392" stroke="#ffffff" stroke-width="36" stroke-linecap="round" opacity="0.9"/>

  <!-- Magnifying glass rim -->
  <circle cx="240" cy="240" r="136" fill="url(#glassGrad)" stroke="#ffffff" stroke-width="28"/>

  <!-- File icon inside lens -->
  <g transform="translate(188, 176)">
    <!-- File body -->
    <path d="M16 0 L72 0 L104 32 L104 112 L16 112 Z" fill="#ffffff" fill-opacity="0.95"/>
    <!-- File fold -->
    <path d="M72 0 L72 32 L104 32" fill="none" stroke="#0078d4" stroke-width="6" stroke-linejoin="round"/>
    <!-- File lines -->
    <line x1="32" y1="56" x2="88" y2="56" stroke="#0078d4" stroke-width="8" stroke-linecap="round" opacity="0.6"/>
    <line x1="32" y1="80" x2="72" y2="80" stroke="#0078d4" stroke-width="8" stroke-linecap="round" opacity="0.6"/>
  </g>

  <!-- Sparkle / AI accent -->
  <g transform="translate(392, 120)">
    <path d="M0 16 Q16 16 16 0 Q16 16 32 16 Q16 16 16 32 Q16 16 0 16" fill="#7ecbff"/>
    <circle cx="24" cy="24" r="6" fill="#b3e0ff" opacity="0.8"/>
  </g>
</svg>
