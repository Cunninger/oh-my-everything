appId: com.oh-my-everything.app
productName: oh-my-everything
directories:
  buildResources: resources
win:
  target:
    - target: nsis
      arch: [x64]
    - target: portable
      arch: [x64]
  icon: resources/icon.ico
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
files:
  - out/**/*
extraResources:
  - from: resources/es
    to: es
    filter:
      - "**/*"
